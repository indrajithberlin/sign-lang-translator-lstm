<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Sign Lens</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f; --surface: #13131a; --border: rgba(255,255,255,0.07);
    --accent: #7fffb2; --text: #f0f0f5; --muted: rgba(240,240,245,0.4);
    --danger: #ff5f6d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Syne', sans-serif;
    height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
  }

  /* ── Camera ── */
  #cam-wrap {
    position: relative; flex: 1; background: #000; overflow: hidden;
  }
  video {
    width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1);
  }

  /* corner brackets */
  .corner { position: absolute; width: 28px; height: 28px; border-color: var(--accent); border-style: solid; opacity: 0.6; }
  .corner.tl { top: 16px; left: 16px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
  .corner.tr { top: 16px; right: 16px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
  .corner.bl { bottom: 16px; left: 16px; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
  .corner.br { bottom: 16px; right: 16px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

  /* hands badge */
  #hands-badge {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(10,10,15,0.75); border: 1px solid var(--border);
    border-radius: 100px; padding: 5px 14px;
    font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted);
    backdrop-filter: blur(10px); transition: all 0.3s; white-space: nowrap;
  }
  #hands-badge.on { color: var(--accent); border-color: rgba(127,255,178,0.3); }

  /* ── Bottom panel ── */
  #panel {
    background: var(--bg); padding: 16px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    display: flex; flex-direction: column; gap: 12px;
  }

  #result-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px 20px;
    display: flex; flex-direction: column; gap: 8px;
    transition: border-color 0.3s;
  }
  #result-card.active { border-color: rgba(127,255,178,0.35); }

  #sign-text {
    font-size: 40px; font-weight: 800; letter-spacing: -1.5px; line-height: 1;
    transition: color 0.2s;
  }
  #sign-text.idle { color: var(--muted); font-size: 20px; font-weight: 400; letter-spacing: 0; }
  #sign-text.flash { color: var(--accent); }

  .conf-row { display: flex; align-items: center; gap: 10px; }
  #conf-wrap { flex: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 100px; overflow: hidden; }
  #conf-bar  { height: 100%; background: var(--accent); width: 0%; border-radius: 100px; transition: width 0.3s; }
  #conf-pct  { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); min-width: 34px; text-align: right; }

  /* history */
  #history { display: flex; gap: 6px; flex-wrap: wrap; min-height: 22px; }
  .tag {
    font-family: 'DM Mono', monospace; font-size: 11px;
    background: rgba(255,255,255,0.05); border-radius: 6px;
    padding: 3px 8px; color: var(--muted);
    animation: pop 0.2s ease;
  }
  @keyframes pop { from { opacity:0; transform:scale(0.8); } to { opacity:1; transform:scale(1); } }

  /* controls */
  .btns { display: flex; gap: 10px; }
  .btn {
    flex: 1; border: none; border-radius: 12px; padding: 14px;
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary { background: var(--accent); color: #0a0a0f; }
  .btn-primary.stop { background: var(--danger); color: #fff; }
  .btn-ghost { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid var(--border); }

  /* status dot */
  #status {
    position: absolute; top: 16px; right: 16px;
    font-family: 'DM Mono', monospace; font-size: 11px;
    background: rgba(10,10,15,0.75); border: 1px solid var(--border);
    border-radius: 100px; padding: 5px 12px; color: var(--muted);
    backdrop-filter: blur(10px); display: flex; align-items: center; gap: 6px;
  }
  #status.ok { color: var(--accent); border-color: rgba(127,255,178,0.25); }
  #status.err { color: var(--danger); border-color: rgba(255,95,109,0.25); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
</style>
</head>
<body>

<div id="cam-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas" style="display:none"></canvas>
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div id="hands-badge">No hands detected</div>
  <div id="status"><div class="dot"></div><span id="status-txt">connecting</span></div>
</div>

<div id="panel">
  <div id="result-card">
    <div id="sign-text" class="idle">Waiting for sign...</div>
    <div class="conf-row">
      <div id="conf-wrap"><div id="conf-bar"></div></div>
      <div id="conf-pct">0%</div>
    </div>
    <div id="history"></div>
  </div>
  <div class="btns">
    <button class="btn btn-primary" id="toggle-btn" onclick="toggle()">Start</button>
    <button class="btn btn-ghost" onclick="clearAll()">Clear</button>
  </div>
</div>

<script>
const sessionId = 'sess_' + Date.now();
const video     = document.getElementById('video');
const canvas    = document.getElementById('canvas');
const ctx       = canvas.getContext('2d');

let running    = false;
let timer      = null;
let frameCount = 0;
let history    = [];

// ── Check server on load ───────────────────────────────────────────────────
async function ping() {
  try {
    const r = await fetch('/status');
    const d = await r.json();
    setStatus('ok', `${d.labels.length} signs`);
  } catch {
    setStatus('err', 'unreachable');
  }
}

// ── Camera init ────────────────────────────────────────────────────────────
async function initCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    video.srcObject = stream;
  } catch(e) {
    setStatus('err', 'camera denied');
  }
}

// ── Start / Stop ───────────────────────────────────────────────────────────
function toggle() {
  running ? stop() : start();
}

function start() {
  running = true;
  frameCount = 0;
  document.getElementById('toggle-btn').textContent = 'Stop';
  document.getElementById('toggle-btn').classList.add('stop');
  timer = setInterval(sendFrame, 100); // 10Hz attempt, skip logic inside
}

function stop() {
  running = false;
  clearInterval(timer);
  document.getElementById('toggle-btn').textContent = 'Start';
  document.getElementById('toggle-btn').classList.remove('stop');
}

// ── Frame capture & POST ───────────────────────────────────────────────────
let sending = false;
async function sendFrame() {
  if (!running || sending || video.videoWidth === 0) return;
  frameCount++;
  if (frameCount % 5 !== 0) return; // send cober indbye # html bahing toi 

  sending = true;
  try {
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    // mirror-flip so MediaPipe sees the correct orientation
    ctx.save();
    ctx.scale(-1, 1);
    ctx.drawImage(video, -canvas.width, 0);
    ctx.restore();

    const b64 = canvas.toDataURL('image/jpeg', 0.65).split(',')[1];

    const resp = await fetch('/predict', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ frame: b64, session_id: sessionId }),
      signal: AbortSignal.timeout(8000)
    });

    const data = await resp.json();
    showResult(data);
    setStatus('ok', 'live');
  } catch {
    setStatus('err', 'timeout');
  } finally {
    sending = false;
  }
}

// ── Display result ─────────────────────────────────────────────────────────
function showResult(data) {
  const signEl = document.getElementById('sign-text');
  const card   = document.getElementById('result-card');
  const bar    = document.getElementById('conf-bar');
  const pct    = document.getElementById('conf-pct');
  const badge  = document.getElementById('hands-badge');

  const conf    = data.confidence || 0;
  const pctVal  = Math.round(conf * 100);
  bar.style.width  = pctVal + '%';
  pct.textContent  = pctVal + '%';

  // hands badge — infer from confidence > 0
  const hasHands = conf > 0;
  badge.textContent = hasHands ? 'Hands detected' : 'No hands detected';
  badge.className   = hasHands ? 'on' : '';

  if (data.prediction) {
    card.classList.add('active');
    signEl.className    = 'flash';
    signEl.textContent  = data.prediction;
    setTimeout(() => signEl.className = '', 300);

    // history strip
    if (history[history.length - 1] !== data.prediction) {
      history.push(data.prediction);
      if (history.length > 6) history.shift();
      document.getElementById('history').innerHTML =
        history.slice(0, -1).map(s => `<span class="tag">${s}</span>`).join('');
    }
  } else {
    card.classList.remove('active');
    signEl.className   = 'idle';
    signEl.textContent = hasHands ? 'Recognising...' : 'Waiting for sign...';
  }
}

function clearAll() {
  history = [];
  document.getElementById('history').innerHTML   = '';
  document.getElementById('sign-text').className = 'idle';
  document.getElementById('sign-text').textContent = 'Waiting for sign...';
  document.getElementById('conf-bar').style.width  = '0%';
  document.getElementById('conf-pct').textContent  = '0%';
  document.getElementById('result-card').classList.remove('active');
}

function setStatus(cls, txt) {
  const el = document.getElementById('status');
  el.className = cls;
  document.getElementById('status-txt').textContent = txt;
}

// ── Init ───────────────────────────────────────────────────────────────────
initCamera();
ping();
</script>
</body>
</html>
